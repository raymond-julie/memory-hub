name: matrix-a-vector-only
description: "Matrix A: vector-only baseline (keyword + reranker disabled)"
model:
  url: https://generativelanguage.googleapis.com
  name: gemini-3.1-flash-lite
  auth:
    secret_ref: gemini-api-key
benchmarks:
  - id: personamem-mcq
    provider_id: 9b72673c-c757-434e-909f-e2f21a616de5
    parameters:
      mode: library
      dataset: personamem
      dataset_variant: "32k"
      memory_provider: memoryhub
      skip_ingestion: true
      query_limit: 589
      disabled_signals: keyword,reranker
      expected_manifest:
        signals:
          vector: {active: true}
          reranker: {active: true}
          keyword: {active: true}
          focus: {active: false}
          domain: {active: false}
          graph: {active: false}
        corpus:
          tenant_id: amb-benchmark
          chunk_nodes: 0
experiment:
  name: memoryhub/personamem-mcq/32k
